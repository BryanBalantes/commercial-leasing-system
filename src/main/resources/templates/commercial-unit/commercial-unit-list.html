<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#0f0f1e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title th:text="${title}"></title>
    <link rel="icon" type="image/png" th:href="@{/images/CommercialSpace_Logo.png}">
    <link rel="stylesheet" href="/css/commercial-style/list-commercial-style.css">
  </head>
  <body>
    <main>
      <!-- DESKTOP NAVIGATION -->
      <nav class="navbar">
        <div class="navbar-container">
          <div href="/" class="navbar-brand">
            <img th:src="@{/images/CommercialSpace_Logo.png}" alt="D AND J RENTALS" class="brand-logo">
            <span class="brand-text">D AND J RENTALS</span>
          </div>

          <div class="navbar-menu">
            <a th:href="@{/homepage/}" class="nav-link">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
              </svg>
              <span>Home</span>
            </a>
            <a th:href="@{/users/}" class="nav-link">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
              </svg>
              <span>Users</span>
            </a>
            <a th:href="@{/leases/add}" class="nav-link">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M6 3h9l4 4v14H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"></path>
                <path d="M15 3v4h4"></path>
                <path d="M9 16l5-5 2 2-5 5H9v-2z"></path>
                <path d="M13 10l2 2"></path>
              </svg>
              <span>Leases</span>
            </a>

            <a th:href="@{/commercial-units}" class="nav-link active">
              <svg width="16" height="16" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round">

                <!-- Building -->
                <rect x="3" y="2" width="14" height="20" rx="2"></rect>

                <!-- Windows -->
                <path d="M7 6h.01"></path>
                <path d="M11 6h.01"></path>
                <path d="M7 10h.01"></path>
                <path d="M11 10h.01"></path>
                <path d="M7 14h.01"></path>
                <path d="M11 14h.01"></path>

                <!-- Door -->
                <path d="M8 22v-4h4v4"></path>

                <!-- Plus Sign -->
                <path d="M20 8v6"></path>
                <path d="M17 11h6"></path>
              </svg>

              <span>Units</span>
            </a>
          </div>

          <a th:href="@{/logout}" class="logout-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            <span>Logout</span>
          </a>
        </div>
      </nav>

      <!-- MOBILE BOTTOM NAVIGATION -->
      <nav class="bottom-nav">

        <a th:href="@{/commercial-units}" class="bottom-nav-item active">
          <svg width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">

            <!-- Building -->
            <rect x="3" y="2" width="14" height="20" rx="2"></rect>

            <!-- Windows -->
            <path d="M7 6h.01"></path>
            <path d="M11 6h.01"></path>
            <path d="M7 10h.01"></path>
            <path d="M11 10h.01"></path>
            <path d="M7 14h.01"></path>
            <path d="M11 14h.01"></path>

            <!-- Door -->
            <path d="M8 22v-4h4v4"></path>

            <!-- Plus Sign -->
            <path d="M20 8v6"></path>
            <path d="M17 11h6"></path>
          </svg>

          <span>Units</span>
        </a>

        <a th:href="@{/users/}" class="bottom-nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
          <span>Users</span>
        </a>

        <div class="nav-spacer"></div>

        <a th:href="@{/leases/add}" class="bottom-nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 3h9l4 4v14H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"></path>
            <path d="M15 3v4h4"></path>
            <path d="M9 16l5-5 2 2-5 5H9v-2z"></path>
            <path d="M13 10l2 2"></path>
          </svg>
          <span>Leases</span>
        </a>

        <a th:href="@{/logout}" class="bottom-nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          <span>Logout</span>
        </a>

        <a th:href="@{/homepage/}" class="center-btn">
          <img src="/images/CommercialSpace_Logo.png" alt="logo">
        </a>
      </nav>

      <!-- COMMERCIAL UNITS SECTION -->
      <section class="commercial-units-section">
        <div class="container">
          <div class="section-header">
            <h1>Users</h1>
            <a th:href="@{/commercial-units/add}" class="btn-add-commercial-units">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="8.5" cy="7" r="4"></circle>
                <line x1="20" y1="8" x2="20" y2="14"></line>
                <line x1="23" y1="11" x2="17" y2="11"></line>
              </svg>
              Add Units
            </a>
          </div>

          <!--      <div class="commercial-units-grid">-->
          <!--        <div class="user-card" th:each="unit : ${units}">-->

          <!--          <h3 th:text="${unit.unitName}">-->
          <!--            Unit Name-->
          <!--          </h3>-->

          <!--          <h3 th:text="${unit.status}">-->
          <!--            Status-->
          <!--          </h3>-->

          <!--        </div>-->
          <!--      </div>-->
          <div class="table-wrapper">
            <table class="units-table">

              <thead>
              <tr>
                <th>Unit Name</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
              </thead>

              <tbody>

              <tr th:each="unit : ${units}">

                <td th:text="${unit.unitName}"></td>

                <td>

                    <span class="status-badge"
                          th:classappend="${unit.status.name().toLowerCase()}"
                          th:text="${unit.status}">
                    </span>

                </td>

                <td class="action-buttons">
                  <a th:href="@{/commercial-units/edit/{id}(id=${unit.id})}"
                     class="btn-action edit">

                    <svg width="18" height="18"
                         viewBox="0 0 24 24"
                         fill="none"
                         stroke="currentColor"
                         stroke-width="2"
                         stroke-linecap="round"
                         stroke-linejoin="round">

                      <path d="M12 20h9"/>
                      <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>

                    </svg>

                  </a>
                  <a th:if="${unit.status.name() == 'VACANT'}"
                     th:href="@{/commercial-units/permanent-delete/{id}(id=${unit.id})}"
                     class="btn-action delete">

                    <svg width="18" height="18"
                         viewBox="0 0 24 24"
                         fill="none"
                         stroke="currentColor"
                         stroke-width="2"
                         stroke-linecap="round"
                         stroke-linejoin="round">

                      <polyline points="3 6 5 6 21 6"/>
                      <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                      <path d="M10 11v6"/>
                      <path d="M14 11v6"/>
                      <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>

                    </svg>

                  </a>
                </td>
              </tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
    <!-- FOOTER -->
    <footer>
      <div class="container">
        <p>&copy; 2025 Uplift Java Bootcamp Batch 2 - LogBook Application</p>
      </div>
    </footer>
  </body>
</html>
