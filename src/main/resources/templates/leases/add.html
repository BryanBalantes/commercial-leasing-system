<div class="container">
  <div class="card">
    <h1 th:text="${lease.id != null ? 'Update Lease' : 'Create Lease'}"></h1>

    <form
            th:action="@{${lease.id != null ? '/leases/update' : '/leases/add'}}"
            th:object="${lease}"
            method="post"
            enctype="multipart/form-data"
    >
      <input type="hidden" th:field="*{id}" />

      <!-- TENANT -->
      <div class="form-group">
        <label>Tenant</label>
        <select th:field="*{userId}" required>
          <option value="">Select Tenant</option>
          <option
                  th:each="u : ${users}"
                  th:value="${u.id}"
                  th:text="${u.firstName + ' ' + u.lastName}"
          ></option>
        </select>
      </div>

      <!-- BASIC -->
      <div class="form-row">
        <div class="form-group">
          <label>Entry Date</label>
          <input type="date" th:field="*{entryDate}" required />
        </div>

        <div class="form-group">
          <label>Monthly Rental</label>
          <!--          <input-->
          <!--                  type="number"-->
          <!--                  step="0.01"-->
          <!--                  th:field="*{monthlyRental}"-->
          <!--                  required-->
          <!--          />-->
          <input type="number"
                 step="0.01"
                 th:field="*{monthlyRental}"
                 id="monthlyRental"
                 readonly />
        </div>
      </div>

      <!-- FINANCIAL -->
      <div class="form-row">
        <div class="form-group">
          <label>Advance</label>
          <input
                  type="number"
                  step="0.01"
                  th:field="*{oneMonthAdvance}"
                  required
          />
        </div>

        <div class="form-group">
          <label>Deposit</label>
          <input
                  type="number"
                  step="0.01"
                  th:field="*{oneMonthDeposit}"
                  required
          />
        </div>
      </div>

      <!-- COMMERCIAL -->
      <div class="form-group">
        <label>Commercial Unit</label>
        <select th:field="*{commercialUnitId}" id="unitSelect" required>
          <option value="">Select Unit</option>

          <option th:each="unit : ${units}"
                  th:value="${unit.id}"
                  th:text="${unit.unitName}"
                  th:attr="data-rent=${unit.monthlyRent}">
          </option>
        </select>
      </div>

      <!-- STATUS -->
      <div class="form-group">
        <label>Status</label>
        <select th:field="*{status}">
          <option value="">Select</option>
          <option value="ACTIVE">Active</option>
          <option value="ENDED">Ended</option>
        </select>
      </div>

      <!-- IMAGE -->
      <div class="form-group">
        <label>Upload Receipt</label>
        <input
                type="file"
                name="file"
                accept="image/*"
                onchange="previewImage(event)"
        />

        <div class="preview">
          <img
                  id="preview"
                  th:if="${lease.receiptImageUrl != null}"
                  th:src="${lease.receiptImageUrl}"
          />
        </div>
      </div>

      <!-- BUTTONS -->
      <div class="btn-group">
        <button
                type="submit"
                class="btn btn-primary"
                th:text="${lease.id != null ? 'Update' : 'Create'}"
        ></button>
        <a th:href="@{/homepage/}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>

<script src="/js/add-lease-script.js"></script>
