<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title th:text="${title}"></title>

    <link rel="icon" type="image/png" th:href="@{/images/CommercialSpace_Logo.png}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" href="/css/login-style/login-style.css">
</head>

<body class="bg-light">

<main class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="container">
        <div class="row justify-content-center">

            <!-- Responsive column -->
            <div class="col-12 col-sm-10 col-md-8 col-lg-5 p-4">

                <!-- Logo -->
                <img class="d-block mx-auto mb-3 img-fluid logo-large"
                     th:src="@{/images/CommercialSpace_Logo.png}">

                <p class="text-center mb-4 tagline-large white-text">
                    Find a Dwelling Space For Your Business
                </p>

                <!-- FORM -->
                <form th:action="@{/authenticate}" method="post">
                    <div th:if="${param.error}" class="alert alert-danger text-center">
                        Invalid username or password
                    </div>
                    <!-- Username -->
                    <div class="mb-3">
                        <label for="username" class="form-label white-text">Username</label>
                        <input type="text" name="username"
                               class="form-control"
                               id="username"
                               placeholder="Enter username">
                    </div>

                    <!-- Password -->
                    <div class="mb-3">
                        <label for="password" class="form-label white-text">Password</label>
                        <input type="password" name="password"
                               class="form-control"
                               id="password"
                               placeholder="Enter password">
                    </div>

                    <!-- Buttons -->
                    <div class="d-grid gap-2">
                        <input type="submit"
                               class="btn btn-outline-success btn-lg"
                               value="SignIn">

                        <a th:href="@{/register}"
                           class="btn btn-outline-success btn-lg">
                            SignUp
                        </a>
                    </div>

                </form>

                <!-- Footer -->
                <p class="text-center mt-4 small white-text">
                    2025 Uplift Java Bootcamp Batch 2
                </p>

            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
