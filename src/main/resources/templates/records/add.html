      <div class="container">

        <div class="card">

          <h1>Add a New Monthly Payment</h1>

          <div class="error"
               th:each="error : ${errors}"
               th:text="${error}">
          </div>

          <form th:action="@{/records/add}"
                th:object="${record}"
                method="post"
                enctype="multipart/form-data">

            <div class="form-group">
              <label for="file">Proof of Payment</label>

              <input type="file"
                     id="file"
                     name="file"
                     accept="image/*">
            </div>

            <div class="form-group">
              <label for="period">Month Of</label>

              <input type="month"
                     id="period"
                     th:field="*{period}">

              <div class="error"
                   th:if="${#fields.hasErrors('period')}"
                   th:errors="*{period}">
              </div>
            </div>

            <div class="form-group">
              <label for="amount">Amount</label>

              <input type="number"
                     id="amount"
                     th:field="*{amount}"
                     step="0.01"
                     min="0">

              <div class="error"
                   th:if="${#fields.hasErrors('amount')}"
                   th:errors="*{amount}">
              </div>
            </div>

            <div class="form-group">
              <label for="date">Date</label>

              <input type="datetime-local"
                     id="date"
                     th:field="*{date}">
            </div>

            <div class="form-group">
              <label for="status">Status</label>

              <select id="status"
                      th:field="*{status}">
                <option value="">-- Select Status --</option>
                <option value="Paid">Paid</option>
                <option value="Partial">Partial</option>
              </select>
            </div>

            <div class="form-group">
              <label for="balance">Balance</label>

              <input type="number"
                     id="balance"
                     th:field="*{balance}"
                     step="0.01"
                     min="0">

              <div class="error"
                   th:if="${#fields.hasErrors('balance')}"
                   th:errors="*{balance}">
              </div>
            </div>

            <div class="form-group">
              <label for="assignee">Assignee</label>

              <select id="assignee"
                      th:field="*{assigneeId}">

                <option value="">-- Select Assignee --</option>

                <option th:each="user : ${users}"
                        th:value="${user.id}"
                        th:text="${user.firstName + ' ' + user.lastName}">
                </option>

              </select>
            </div>

            <div class="form-group">
              <label for="lease">Lease</label>

              <select id="lease"
                      th:field="*{leaseId}">

                <option value="">-- Select Commercial Unit --</option>

                <option th:each="lease : ${leases}"
                        th:value="${lease.id}"
                        th:text="'Commercial Unit ' + ${lease.unitName}">>
                </option>

              </select>
            </div>

            <div class="btn-group">

              <button type="submit"
                      class="btn btn-primary">
                Submit
              </button>

              <a th:href="@{/users/}"
                 class="btn btn-secondary">
                Cancel
              </a>

            </div>

          </form>

        </div>
      </div>
