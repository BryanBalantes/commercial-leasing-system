<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}"></title>
    <link rel="icon" type="image/png" th:href="@{/images/CommercialSpace_Logo.png}">
    <link rel="stylesheet" href="/css/user-style/add-user-style.css">
  </head>
  <body>
    <main>
      <nav class="navbar">
        <div class="navbar-container">
          <div class="navbar-brand">
            <img th:src="@{/images/CommercialSpace_Logo.png}" alt="D AND J RENTALS" class="brand-logo">
            <span class="brand-text">D AND J RENTALS</span>
          </div>

          <div class="navbar-menu">
            <a th:href="@{/homepage/}" class="nav-link">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                <polyline points="9 22 9 12 15 12 15 22"></polyline>
              </svg>
              <span>Home</span>
            </a>
            <a th:href="@{/users/}" class="nav-link active">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
              </svg>
              <span>Users</span>
            </a>
            <a th:href="@{/leases/add}" class="nav-link">

                <path d="M13 10l2 2"></path>
              </svg>
              <span>Leases</span>
            </a>

            <a th:href="@{/commercial-units}" class="nav-link">
              <svg width="16" height="16" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round">

                <!-- Building -->
                <rect x="3" y="2" width="14" height="20" rx="2"></rect>

                <!-- Windows -->
                <path d="M7 6h.01"></path>
                <path d="M11 6h.01"></path>
                <path d="M7 10h.01"></path>
                <path d="M11 10h.01"></path>
                <path d="M7 14h.01"></path>
                <path d="M11 14h.01"></path>

                <!-- Door -->
                <path d="M8 22v-4h4v4"></path>

                <!-- Plus Sign -->
                <path d="M20 8v6"></path>
                <path d="M17 11h6"></path>
              </svg>

              <span>Units</span>
            </a>
          </div>

          <a th:href="@{/logout}" class="logout-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            <span>Logout</span>
          </a>
        </div>
      </nav>

      <!-- Mobile Bottom Navigation -->
      <nav class="bottom-nav">
        <!--      <a th:href="@{/homepage/}" class="bottom-nav-item">-->
        <!--        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">-->
        <!--          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>-->
        <!--          <polyline points="9 22 9 12 15 12 15 22"></polyline>-->
        <!--        </svg>-->
        <!--        <span>Home</span>-->
        <!--      </a>-->

        <a th:href="@{/commercial-units}" class="bottom-nav-item">
          <svg width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">

            <!-- Building -->
            <rect x="3" y="2" width="14" height="20" rx="2"></rect>

            <!-- Windows -->
            <path d="M7 6h.01"></path>
            <path d="M11 6h.01"></path>
            <path d="M7 10h.01"></path>
            <path d="M11 10h.01"></path>
            <path d="M7 14h.01"></path>
            <path d="M11 14h.01"></path>

            <!-- Door -->
            <path d="M8 22v-4h4v4"></path>

            <!-- Plus Sign -->
            <path d="M20 8v6"></path>
            <path d="M17 11h6"></path>
          </svg>

          <span>Units</span>
        </a>

        <a th:href="@{/users/}"  class="bottom-nav-item active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
          <span>Users</span>
        </a>

        <!-- CENTER SLOT (EMPTY FOR SPACING) -->
        <div class="nav-spacer"></div>

        <a th:href="@{/leases/add}" class="bottom-nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <!-- Notebook -->
            <path d="M6 3h9l4 4v14H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"></path>
            <path d="M15 3v4h4"></path>

            <!-- Pen -->
            <path d="M9 16l5-5 2 2-5 5H9v-2z"></path>
            <path d="M13 10l2 2"></path>
          </svg>
          <span>Leases</span>
        </a>

        <a th:href="@{/logout}" class="bottom-nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          <span>Logout</span>
        </a>

        <!-- FLOATING BUTTON -->
        <a th:href="@{/homepage/}" class="center-btn ">
          <img src="/images/CommercialSpace_Logo.png" alt="logo">
        </a>
      </nav>


      <div class="container">
        <div class="form-section">
          <h1>Registration</h1>
          <form th:action="@{/users/add}" th:object="${user}" method="post" enctype="multipart/form-data">
            <div class="form-group">
              <label for="image">Profile Picture</label>
              <input type="file"
                     id="image"
                     th:field="*{image}"
                     accept="image/*">
            </div>

            <div class="form-group">
              <label for="firstName">First Name</label>
              <input type="text" id="firstName" th:field="*{firstName}" placeholder="Enter your first name" required>
            </div>

            <div class="form-group">
              <label for="lastName">Last Name</label>
              <input type="text" id="lastName" th:field="*{lastName}" placeholder="Enter your last name" required>
            </div>

            <div class="form-group">
              <label for="middleName">Middle Name</label>
              <input type="text" id="middleName" th:field="*{middleName}" placeholder="Enter your middle name">
            </div>

            <div class="form-group">
              <label for="contactNumber">Contact Number</label>
              <input type="text" id="contactNumber" th:field="*{contactNumber}" placeholder="Enter your contact number">
            </div>

            <div class="form-group">
              <label for="address">Address</label>
              <input type="text" id="address" th:field="*{address}" placeholder="Enter your address">
            </div>

            <div class="form-group">
              <label for="emailAddress">Email Address</label>
              <input type="email" id="emailAddress" th:field="*{emailAddress}" placeholder="Enter your email address" required>
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" th:field="*{password}" placeholder="Enter a strong password" required>
            </div>

            <div class="form-group">
              <label for="confirmPassword">Confirm Password</label>
              <input type="password" id="confirmPassword" th:field="*{confirmPassword}" placeholder="Confirm your password" required>
            </div>

            <div class="button-group">
              <button type="submit">Register</button>
            </div>
          </form>
        </div>
      </div>
    </main>
    <footer>
      <div class="footer-content">
        <div>
          <span>© 2025 LogBook Application, Inc</span>
        </div>
        <ul class="social-links">
          <li><a href="#" aria-label="Instagram">Instagram</a></li>
          <li><a href="#" aria-label="Facebook">Facebook</a></li>
        </ul>
      </div>
    </footer>
  </body>
</html>
