<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}"></title>
    <link rel="icon" type="image/png" th:href="@{/images/CommercialSpace_Logo.png}">
    <link rel="stylesheet" href="/css/user-style/admin-user-style.css">
  </head>
  <body>

    <nav class="navbar">
      <div class="navbar-container">
        <div class="navbar-brand">
          <img th:src="@{/images/CommercialSpace_Logo.png}" alt="D AND J RENTALS" class="brand-logo">
          <span class="brand-text">D AND J RENTALS</span>
        </div>

        <div class="navbar-menu">
          <a th:href="@{/homepage/}" class="nav-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
              <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span>Home</span>
          </a>
          <a th:href="@{/users/}" class="nav-link active">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
            <span>Users</span>
          </a>
          <a th:href="@{/leases/add}" class="nav-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <!-- Notebook -->
              <path d="M6 3h9l4 4v14H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"></path>
              <path d="M15 3v4h4"></path>

              <!-- Pen -->
              <path d="M9 16l5-5 2 2-5 5H9v-2z"></path>
              <path d="M13 10l2 2"></path>
            </svg>
            <span>Leases</span>
          </a>

          <a th:href="@{/commercial-units}" class="nav-link">
            <svg width="16" height="16" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">

              <!-- Building -->
              <rect x="3" y="2" width="14" height="20" rx="2"></rect>

              <!-- Windows -->
              <path d="M7 6h.01"></path>
              <path d="M11 6h.01"></path>
              <path d="M7 10h.01"></path>
              <path d="M11 10h.01"></path>
              <path d="M7 14h.01"></path>
              <path d="M11 14h.01"></path>

              <!-- Door -->
              <path d="M8 22v-4h4v4"></path>

              <!-- Plus Sign -->
              <path d="M20 8v6"></path>
              <path d="M17 11h6"></path>
            </svg>

            <span>Units</span>
          </a>
        </div>

        <a th:href="@{/logout}" class="logout-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          <span>Logout</span>
        </a>
      </div>
    </nav>

    <!-- Mobile Bottom Navigation -->
    <nav class="bottom-nav">

      <a th:href="@{/commercial-units}" class="bottom-nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">

          <!-- Building -->
          <rect x="3" y="2" width="14" height="20" rx="2"></rect>

          <!-- Windows -->
          <path d="M7 6h.01"></path>
          <path d="M11 6h.01"></path>
          <path d="M7 10h.01"></path>
          <path d="M11 10h.01"></path>
          <path d="M7 14h.01"></path>
          <path d="M11 14h.01"></path>

          <!-- Door -->
          <path d="M8 22v-4h4v4"></path>

          <!-- Plus Sign -->
          <path d="M20 8v6"></path>
          <path d="M17 11h6"></path>
        </svg>

        <span>Units</span>
      </a>

      <a th:href="@{/users/}"  class="bottom-nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
        <span>Users</span>
      </a>

      <div class="nav-spacer"></div>

      <a th:href="@{/leases/add}" class="bottom-nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

          <path d="M6 3h9l4 4v14H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"></path>
          <path d="M15 3v4h4"></path>

          <path d="M9 16l5-5 2 2-5 5H9v-2z"></path>
          <path d="M13 10l2 2"></path>
        </svg>
        <span>Leases</span>
      </a>

      <a th:href="@{/logout}" class="bottom-nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        <span>Logout</span>
      </a>

      <a th:href="@{/homepage/}" class="center-btn ">
        <img src="/images/CommercialSpace_Logo.png" alt="logo">
      </a>
    </nav>

    <div class="container">

      <div id="user-detail">


        <div class="detail-header">
          <div>
            <img th:src="${user.profilePicUrl != null ? user.profilePicUrl : '/images/default.png'}" alt="Tenant Image" class="detail-avatar">

            <h1 th:text="${user.firstName + ' ' + user.middleName + ' ' + user.lastName}" class="page-title"></h1>
          </div>
          <div class="detail-actions">
            <button class="btn btn-secondary" onclick="openModal('editUserModal')">✎ Edit Profile</button>
            <button class="btn btn-danger" onclick="openDeleteConfirm('user', 'John Doe')">🗑 Delete User</button>
          </div>
        </div>

        <div class="detail-info">
          <div class="info-group">
            <div class="info-field">
              <div class="info-label">Address</div>
              <div th:text="${user.address}" class="info-value"></div>
            </div>
            <div class="info-field">
              <div class="info-label">Contact</div>
              <div th:text="${user.contactNumber}" class="info-value"></div>
            </div>
          </div>

          <div class="info-group">
            <div class="info-field">
              <div class="info-label">Email</div>
              <div th:text="${user.emailAddress}" class="info-value"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="editUserModal" class="modal" onclick="closeModalOnBackdrop(event, 'editUserModal')">
      <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
          <h2 class="modal-title">Edit User Profile</h2>
          <button class="modal-close" onclick="closeModal('editUserModal')">×</button>
        </div>
        <form id="editUserForm" th:action="@{/users/update}"
              th:object="${user}"
              th:method="post"
              enctype="multipart/form-data">
          <input type="hidden"
                 th:field="*{id}">
          <div class="form-row">
            <div class="form-group">
              <label for="editUserFirstName">First Name</label>
              <input th:field="*{firstName}" type="text" id="editUserFirstName" required>
            </div>
            <div class="form-group">
              <label for="editUserMiddleName">Middle Name</label>
              <input th:field="*{middleName}" type="text" id="editUserMiddleName" required>
            </div>
            <div class="form-group">
              <label for="editUserLastName">Last Name</label>
              <input th:field="*{lastName}" type="text" id="editUserLastName" required>
            </div>
            <div class="form-group">
              <label for="editUserEmail">Email</label>
              <input th:field="*{emailAddress}" type="email" id="editUserEmail" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="editUserPhone">Phone</label>
              <input th:field="*{contactNumber}" type="tel" id="editUserPhone" required>
            </div>
            <div class="form-group">
              <label for="editUserAddress">Address</label>
              <input th:field="*{address}" type="text" id="editUserAddress" required>
            </div>
          </div>
          <div class="form-group">
            <label>Profile Image</label>
            <input
                    type="file"
                    name="image"
                    accept="image/*"
                    onchange="previewImage(event)"
            />
            <div class="preview">
              <img
                      id="preview"
                      th:if="${user.profilePicUrl != null}"
                      th:src="${user.profilePicUrl}"
              />
            </div>
          </div>
          <div class="form-group">
            <label>Status</label>
            <div class="info-value">
                <span th:if="${user.active}" class="badge badge-active">
                    ACTIVE
                </span>
              <span th:unless="${user.active}" class="badge badge-inactive">
                INACTIVE
                </span>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" onclick="closeModal('editUserModal')">Cancel</button>
            <button type="submit" class="btn btn-primary">
              Save Changes
            </button>
          </div>
        </form>
      </div>
    </div>

    <div id="deleteConfirmModal" class="modal" onclick="closeModalOnBackdrop(event, 'deleteConfirmModal')">
      <div class="modal-content" onclick="event.stopPropagation()" style="max-width: 400px;">
        <div class="modal-header">
          <h2 class="modal-title">Confirm Delete</h2>
          <button class="modal-close" onclick="closeModal('deleteConfirmModal')">×</button>
        </div>
        <p id="deleteMessage" style="color: var(--text-secondary); margin-bottom: 1.5rem;"></p>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeModal('deleteConfirmModal')">Cancel</button>
          <button type="button" class="btn btn-danger" onclick="confirmDelete()">Delete</button>
        </div>
      </div>
    </div>

    <script src="/js/admin-user-script.js"></script>
  </body>
</html>
